version: "3.8"

services:
  mongodb:
    image: mongo:latest
    container_name: exam_system_db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: ./server
      dockerfile: ../infra/docker/Dockerfile.server
    container_name: exam_system_api
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/exam_system
      - JWT_SECRET=fallbacksecret
    depends_on:
      - mongodb

  client:
    build:
      context: ./client
      dockerfile: ../infra/docker/Dockerfile.client
    container_name: exam_system_web
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  mongo-data:
